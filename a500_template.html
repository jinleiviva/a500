<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.5,user-scalable=yes">
<title>A500 温度计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
  background:#f5f7fa;color:#1a1a2e;
  display:flex;justify-content:center;padding:16px 12px
}
.container{max-width:480px;width:100%}

/* ── Header ── */
.hd{text-align:center;margin-bottom:10px}
.hd h1{font-size:18px;font-weight:700}
.hd .meta{font-size:11px;color:#aaa;margin-top:2px}

/* ── Temperature (big) ── */
.temp-wrap{text-align:center;margin-bottom:10px}
.temp-ring{width:140px;height:140px;margin:0 auto;position:relative}
.temp-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.temp-ring .bg{fill:none;stroke:#eee;stroke-width:12}
.temp-ring .arc{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 0.5s}
.temp-ring .num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:42px;font-weight:800;line-height:1
}
.temp-ring .lbl{
  position:absolute;top:calc(50% + 30px);left:50%;transform:translateX(-50%);
  font-size:16px;font-weight:700
}

/* ── Advice ── */
.adv{text-align:center;padding:10px;border-radius:10px;margin-bottom:10px;font-weight:600;font-size:14px;line-height:1.5}
.adv-hot{background:#fdedec;color:#c0392b}
.adv-warn{background:#fff3e0;color:#d35400}
.adv-ok{background:#e8f8f0;color:#1e8449}
.adv-cold{background:#eaf2f8;color:#2980b9}

/* ── Numbers grid ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.g-cell{background:#fff;border-radius:10px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.03)}
.g-cell .g-lbl{font-size:10px;color:#999;margin-bottom:1px}
.g-cell .g-val{font-size:18px;font-weight:700}
.g-cell .g-sub{font-size:11px;margin-top:0}

/* ── Compare line ── */
.comp{background:#fff;border-radius:10px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,0.03);margin-bottom:8px;text-align:center}
.comp .c-title{font-size:10px;color:#999;margin-bottom:3px}
.comp .c-val{font-size:14px;font-weight:600}

/* ── RT card ── */
.rt{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.03);margin-bottom:8px;text-align:center}
.rt .hdr{margin-bottom:2px}
.rt .hdr .dot{font-size:10px;vertical-align:middle}
.rt .hdr .dot.on{color:#27ae60;animation:pulse 2s infinite}
.rt .hdr .dot.off{color:#bbb}
.rt .hdr .lab{font-size:12px;color:#888}
.rt .price{font-size:24px;font-weight:700;margin:2px 0}
.rt .chg{font-size:14px;margin-bottom:4px}
.rt .meta{display:flex;justify-content:center;gap:20px}
.rt .meta .it{text-align:center}
.rt .meta .lab{font-size:10px;color:#888}
.rt .meta .num{font-size:13px;font-weight:600}
.rt .foot{font-size:10px;color:#ccc;margin-top:4px}
.rt .err{font-size:11px;color:#e74c3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── Charts ── */
.c-card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,0.03);margin-bottom:8px}
.c-card .c-title{font-size:11px;font-weight:700;margin-bottom:4px;color:#888}
.c-card .mini{height:36px;display:flex;align-items:flex-end;gap:2px}
.c-card .mini .bar{flex:1;border-radius:2px 2px 0 0;transition:height 0.3s;min-height:2px}
.c-card .rng{display:flex;justify-content:space-between;font-size:9px;color:#ccc;margin-top:2px}
.c-card canvas{width:100%!important;height:80px!important}

/* ── Footer ── */
.ft{text-align:center;font-size:9px;color:#ccc;padding:6px 0 12px}
.ft .tag{display:inline-block;padding:1px 5px;border-radius:3px;font-weight:600;font-size:9px;margin:0 1px}

.loading{text-align:center;padding:60px 0;color:#999}
.loading .sp{width:24px;height:24px;margin:0 auto 8px;border:3px solid #eee;border-top-color:#e74c3c;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading"><div class="sp"></div><div>数据加载中…</div></div>

  <div id="content" style="display:none">

    <!-- Header -->
    <div class="hd">
      <h1>📊 A500 温度计</h1>
      <div class="meta"><span id="todayDate">—</span> · <span id="genTime"></span></div>
    </div>

    <!-- Temperature -->
    <div class="temp-wrap">
      <div class="temp-ring">
        <svg viewBox="0 0 160 160">
          <circle class="bg" cx="80" cy="80" r="68"/>
          <circle class="arc" id="mainArc" cx="80" cy="80" r="68" stroke-dasharray="427.26" stroke-dashoffset="100" stroke="#e74c3c"/>
        </svg>
        <div class="num" id="tempNum">--</div>
        <div class="lbl" id="tempLbl">--</div>
      </div>
    </div>

    <!-- Advice -->
    <div class="adv" id="advice">加载中…</div>

    <!-- Quick numbers -->
    <div class="grid">
      <div class="g-cell">
        <div class="g-lbl">当前点位</div>
        <div class="g-val" id="priceVal">--</div>
        <div class="g-sub" id="priceChg" style="color:#e74c3c">--</div>
      </div>
      <div class="g-cell">
        <div class="g-lbl">回本年限（PE）</div>
        <div class="g-val" id="peVal">--</div>
        <div class="g-sub" id="peRank" style="color:#e74c3c">贵不贵：--</div>
      </div>
      <div class="g-cell">
        <div class="g-lbl">买股票的年回报</div>
        <div class="g-val" id="stockVal" style="color:#27ae60">--</div>
      </div>
      <div class="g-cell">
        <div class="g-lbl">买国债的年利息</div>
        <div class="g-val" id="bondVal" style="color:#999">--</div>
      </div>
    </div>

    <!-- Compare: stock vs bond -->
    <div class="comp">
      <div class="c-title">股票 vs 国债</div>
      <div class="c-val" id="compVal" style="color:#27ae60">--</div>
    </div>

    <!-- Real-time -->
    <div class="rt" id="rtCard" style="display:none">
      <div class="hdr">
        <span class="dot" id="rtDot">●</span>
        <span class="lab" id="rtLbl">盘中实时</span>
      </div>
      <div class="price" id="rtPrice">--</div>
      <div class="chg" id="rtChg">--</div>
      <div class="meta">
        <div class="it"><div class="lab">估算回本</div><div class="num" id="rtPe">--</div></div>
        <div class="it"><div class="lab">估算温度</div><div class="num" id="rtTemp">--°C</div></div>
      </div>
      <div class="foot"><span id="rtTime"></span><span id="rtCD"></span></div>
      <div class="err" id="rtErr"></div>
    </div>

    <!-- Mini chart -->
    <div class="c-card">
      <div class="c-title">走势 <span id="chStart" style="float:right;font-weight:400;color:#ccc">--</span> <span id="chEnd" style="float:right;font-weight:400;color:#ccc;margin-right:6px">--</span></div>
      <div class="mini" id="miniChart"></div>
    </div>

    <!-- Temp trend -->
    <div class="c-card">
      <div class="c-title">温度变化</div>
      <canvas id="tempChart"></canvas>
    </div>

    <!-- Footer -->
    <div class="ft">
      <span class="tag" style="background:#e8f8f0;color:#1e8449">点位/国债实时</span>
      <span class="tag" style="background:#fff3e0;color:#d35400">回本年限为估值</span>
      <span class="tag" style="background:#f5f5f5;color:#888">温度仅供参考</span>
       · 每日更新 · 不构成投资建议
    </div>

  </div>
</div>

<script>
(function(){
  const D = {
    'date': '--', 'price': --, 'priceChange': --, 'pe': --,
    'pePercentile': --, 'pePercentilePrev': --, 'stockYield': --, 'bondYield': --,
    'premium': --, 'temperature': --, 'dcaPct': --, 'dcaLabel': '--',
    'recentCloses': [5000], 'tempHistory': [{d:"01-01",t:50}],
    'priceStale': false, 'peLastCalibrated': '--',
    'peHistory': [{d:"01-01",pe:16}], 'pageCreatedAt': '--', 'pricePercentile': --,
  };
  window.__D = D;

  function tInfo(t){
    if(t<30) return {c:'#2980b9',l:'🟢 偏冷',bg:'#eaf2f8'};
    if(t<60) return {c:'#f39c12',l:'🟡 合理',bg:'#fef9e7'};
    if(t<80) return {c:'#e67e22',l:'🟠 偏高',bg:'#fff3e0'};
    return {c:'#e74c3c',l:'🔴 过热',bg:'#fdedec'};
  }
  function tAdv(t){
    if(t<30) return '✅ 市场偏冷，适合逐步买入，不用害怕下跌';
    if(t<60) return '✅ 估值正常，按计划买入就行，不用天天看盘';
    if(t<80) return '⚠️ 已经偏贵了，先别买新的，持有就行，钱先放债基或余额宝';
    return '🔴 太热了，可以考虑卖一部分。不要追高，卖出来的钱先放货币基金';
  }

  function render(){
    var d=D,ti=tInfo(d.temperature);
    document.getElementById('todayDate').textContent='数据截至 '+d.date+' 收盘';
    document.getElementById('genTime').textContent='更新于 '+d.pageCreatedAt;

    // Temperature ring
    var C=2*Math.PI*68,arc=document.getElementById('mainArc');
    arc.style.strokeDasharray=C;
    arc.style.strokeDashoffset=C*(1-d.temperature/100);
    arc.style.stroke=ti.c;
    document.getElementById('tempNum').textContent=d.temperature;
    document.getElementById('tempNum').style.color=ti.c;
    document.getElementById('tempLbl').textContent=ti.l;
    document.getElementById('tempLbl').style.color=ti.c;

    // Advice
    var adv=document.getElementById('advice');
    adv.textContent=tAdv(d.temperature);
    if(d.temperature>=80) adv.className='adv adv-hot';
    else if(d.temperature>=60) adv.className='adv adv-warn';
    else if(d.temperature>=30) adv.className='adv adv-ok';
    else adv.className='adv adv-cold';

    // Numbers
    document.getElementById('priceVal').textContent=d.price.toLocaleString();
    var pc=document.getElementById('priceChg');
    pc.textContent=(d.priceChange>0?'+':'')+d.priceChange.toFixed(2)+'%';
    pc.style.color=d.priceChange>=0?'#e74c3c':'#27ae60';

    document.getElementById('peVal').textContent=d.pe+' 年';
    var pr=document.getElementById('peRank');
    pr.textContent='贵不贵：'+d.pePercentile+'%';
    pr.style.color=d.pePercentile>70?'#e74c3c':d.pePercentile>50?'#f39c12':'#27ae60';

    document.getElementById('stockVal').textContent=d.stockYield+'%';
    document.getElementById('bondVal').textContent=d.bondYield+'%';

    // Compare
    var cv=document.getElementById('compVal');
    if(d.premium>3){cv.textContent='✅ 股票比国债多赚 '+d.premium+'%，买股票更划算';cv.style.color='#1e8449';}
    else if(d.premium>1.5){cv.textContent='🟡 股票比国债多赚 '+d.premium+'%，还可以';cv.style.color='#b7950b';}
    else if(d.premium>0){cv.textContent='🟠 股票只比国债多赚 '+d.premium+'%，吸引力一般';cv.style.color='#d35400';}
    else{cv.textContent='🔴 国债利息比股票回报还高，买债券更划算';cv.style.color='#c0392b';}

    // Mini chart
    var cls=d.recentCloses,mn=Math.min.apply(null,cls),mx=Math.max.apply(null,cls),rg=mx-mn||1;
    document.getElementById('miniChart').innerHTML=cls.map(function(c,i){
      var h=((c-mn)/rg)*28+2,p=i>0?cls[i-1]:c;
      return '<div class="bar" style="height:'+h+'px;background:'+(c>=p?'#27ae60':'#e74c3c')+'"></div>';
    }).join('');
    document.getElementById('chStart').textContent=cls[0].toLocaleString();
    document.getElementById('chEnd').textContent=cls[cls.length-1].toLocaleString();

    // Temp trend
    if(d.tempHistory&&d.tempHistory.length>0){
      new Chart(document.getElementById('tempChart').getContext('2d'),{
        type:'line',data:{
          labels:d.tempHistory.map(function(r){return r.d}),
          datasets:[{
            label:'温度',data:d.tempHistory.map(function(r){return r.t}),
            borderColor:'#bbb',backgroundColor:'rgba(180,180,180,0.1)',
            borderWidth:1.5,fill:true,tension:0.4,pointRadius:0,
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{
            x:{display:true,grid:{display:false},ticks:{maxTicksLimit:7,font:{size:9},color:'#ccc'}},
            y:{display:true,min:0,max:100,grid:{color:'#f5f5f5'},ticks:{font:{size:9},color:'#ccc',callback:function(v){return v+'°C'}}}
          }
        }
      });
    }

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  }
  setTimeout(render,300);
})();

// ── Real-time ──
(function(){
  var c=document.getElementById('rtCard'),dt=document.getElementById('rtDot'),
      lb=document.getElementById('rtLbl'),pr=document.getElementById('rtPrice'),
      cg=document.getElementById('rtChg'),pe=document.getElementById('rtPe'),
      tp=document.getElementById('rtTemp'),ti=document.getElementById('rtTime'),
      cd=document.getElementById('rtCD'),er=document.getElementById('rtErr'),
      rt=null,cts=null,cdn=0;

  function isMarket(){
    var n=new Date();
    if(n.getDay()===0||n.getDay()===6)return false;
    var t=n.getHours()*100+n.getMinutes();
    return(t>=930&&t<=1130)||(t>=1300&&t<=1500);
  }
  function parseT(text){
    var m=text.match(/v_sh000510="([^"]+)"/);
    if(!m)return null;
    var f=m[1].split('~');
    if(f.length<35)return null;
    return{price:parseFloat(f[3]),yc:parseFloat(f[4]),change:parseFloat(f[31])||0,pct:parseFloat(f[32])||0,high:parseFloat(f[33])||0,low:parseFloat(f[34])||0,ts:f[30]||''};
  }
  function compRT(rtD){
    if(!rtD||!rtD.price)return null;
    var rPe=D.pe*rtD.price/D.price,cnt=0,h=D.peHistory||[];
    for(var i=0;i<h.length;i++){if(h[i].pe<=rPe)cnt++}
    var rPct=h.length>0?cnt/h.length*100:D.pePercentile;
    var rT=Math.round((rPct*0.6+D.pricePercentile*0.4)*10)/10;
    return{pe:rPe,temp:rT};
  }
  function upUI(rd,cp){
    if(!rd)return;
    var ih=isMarket();
    dt.className='dot '+(ih?'on':'off');
    lb.textContent=ih?'盘中实时':'盘后';
    var up=rd.change>=0,co=up?'#e74c3c':'#27ae60';
    pr.textContent=rd.price.toLocaleString();pr.style.color=co;
    cg.textContent=(up?'+':'')+rd.pct.toFixed(2)+'%';cg.style.color=co;
    if(cp){
      pe.textContent=cp.pe.toFixed(2);
      tp.innerHTML=cp.temp+'°C';tp.style.color=cp.temp>=80?'#e74c3c':cp.temp>=60?'#e67e22':cp.temp>=30?'#f39c12':'#2980b9';
    }
    if(rd.ts&&rd.ts.length>=14)ti.textContent='更新于 '+rd.ts.substring(8,10)+':'+rd.ts.substring(10,12)+':'+rd.ts.substring(12,14);
    er.textContent='';
  }
  function fetchRT(){
    fetch('https://qt.gtimg.cn/q=sh000510&_='+Date.now())
      .then(function(r){return r.arrayBuffer()})
      .then(function(buf){
        var txt=new TextDecoder('gbk').decode(buf),rd=parseT(txt);
        if(!rd||isNaN(rd.price)){er.textContent='数据解析失败';return}
        upUI(rd,compRT(rd));
      })
      .catch(function(){er.textContent='数据获取失败'});
  }
  function rstCD(n){cdn=n;cd.textContent=' · '+n+'s';if(cts)clearInterval(cts);cts=setInterval(function(){cdn--;cd.textContent=cdn>0?' · '+cdn+'s':' · 刷新中…'},1000)}

  setTimeout(function(){
    if(!window.__D){c.style.display='none';return}
    c.style.display='block';fetchRT();rstCD(60);
    rt=setInterval(function(){fetchRT();rstCD(60)},60000);
    setInterval(function(){
      lb.textContent=isMarket()?'盘中实时':'盘后';
      dt.className='dot '+(isMarket()?'on':'off');
    },30000);
  },500);
})();
</script>
</body>
</html>
